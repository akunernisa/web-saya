<!DOCTYPE html>
<html>

<head>

    <title>Mini Project Web</title>

    <link rel="stylesheet" href="css/style.css">

</head>

<body>

    <div class="container">

        <h1>🚀 Mini Project Web</h1>

        <div class="section">

            <h2>👤 Masukkan Nama</h2>

            <input type="text" id="namaInput" placeholder="Ketik nama...">

            <button onclick="tampilkanNama()">Tampilkan</button>

            <p id="hasilNama"></p>

        </div>

        <div class="section">

            <h2>🎯 Daftar Hobi</h2>

            <input type="text" id="hobiInput" placeholder="Masukkan hobi">

            <button onclick="tambahHobi()">Tambah</button>

            <ul id="listHobi"></ul>

        </div>

    </div>

    <script src="js/script.js"></script>

</body>

</html>
